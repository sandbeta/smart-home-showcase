<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>智慧之家 · 智能家居</title>
  <style>
    :root {
      --bg: #06060A;
      --bg2: #0E0E18;
      --bg3: #18182A;
      --card: #14141F;
      --ink: #E8E8F0;
      --muted: #7A7A95;
      --rule: rgba(120,100,255,0.1);
      --accent: #9D7BFF;
      --accent2: #00E5C0;
      --accent3: #FF5E7A;
      --accent4: #FFB020;
      --accent-soft: rgba(157,123,255,0.1);
      --accent2-soft: rgba(0,229,192,0.1);
      --neon: 0 0 12px rgba(157,123,255,0.4);
      --radius: 16px;
      --radius-sm: 12px;
      --font: "PingFang SC", "Noto Sans CJK SC", "WenQuanYi Micro Hei", system-ui, -apple-system, sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--bg); color: var(--ink); font-family: var(--font); min-height:100vh; line-height:1.5; -webkit-font-smoothing:antialiased; overflow-x:hidden; padding-bottom: calc(80px + var(--safe-bottom)); position: relative; }
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background-image: linear-gradient(rgba(157,123,255,0.03) 1px,transparent 1px), linear-gradient(90deg, rgba(157,123,255,0.03) 1px,transparent 1px); background-size:40px 40px; mask-image:radial-gradient(ellipse 80% 60% at 50% 30%, black 35%, transparent 70%); }
    body::after { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); opacity:0.4; }

    /* Floating particles */
    .sci-particles { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
    .sci-particle { position:absolute; width:3px; height:3px; border-radius:50%; background:var(--accent); opacity:0; animation:sci-float 8s linear infinite; box-shadow:0 0 6px rgba(157,123,255,0.8); }
    .sci-particle:nth-child(odd) { background:var(--accent2); box-shadow:0 0 6px rgba(0,229,192,0.8); animation-duration:12s; }
    .sci-particle:nth-child(3n) { background:var(--accent3); animation-duration:10s; }
    @keyframes sci-float { 0% { transform:translateY(100vh) translateX(0); opacity:0; } 10% { opacity:0.9; } 90% { opacity:0.9; } 100% { transform:translateY(-10vh) translateX(40px); opacity:0; } }

    .page { position:relative; z-index:1; }
    .container { max-width: 800px; margin: 0 auto; padding: 0 16px; }

    /* ===== HEADER ===== */
    .header { padding: 20px 16px 12px; position: relative; z-index: 2; }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header-home { display: flex; align-items: center; gap: 8px; }
    .header-home-name { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header-home-arrow { font-size: 12px; color: var(--muted); }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .header-actions .nav-versions { display: flex; gap: 4px; }
    .header-actions .nav-ver { font-size: 10px; font-weight: 500; padding: 4px 8px; border-radius: 5px; border: 1px solid var(--rule); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; font-family: inherit; text-decoration: none; white-space: nowrap; }
    .header-actions .nav-ver:hover { border-color: var(--accent); color: var(--ink); }
    .header-actions .nav-ver.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .header-weather { display: flex; align-items: center; gap: 6px; margin-top: 4px; font-size: 12px; color: var(--muted); }
    .header-weather .temp { font-size: 16px; font-weight: 600; color: var(--ink); }
    .header-status { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: var(--accent2); }
    .header-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse-dot 2s infinite; margin-top: 4px; }
    @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* ===== SCENE BAR ===== */
    .scene-bar { padding: 8px 0 16px; }
    .scene-bar-scroll { display: flex; gap: 10px; overflow-x: auto; scroll-behavior: smooth; -ms-overflow-style: none; scrollbar-width: none; padding: 0 16px; }
    .scene-bar-scroll::-webkit-scrollbar { display: none; }
    .scene-pill { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 16px; background: var(--card); border: 1px solid var(--rule); border-radius: 14px; cursor: pointer; transition: all 0.3s; font-family: inherit; color: var(--ink); min-width: 72px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .scene-pill:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(157,123,255,0.15); }
    .scene-pill:active { transform: scale(0.95); }
    .scene-pill.running { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 20px rgba(157,123,255,0.2); }
    .scene-pill .scene-pill-icon { font-size: 24px; line-height: 1; }
    .scene-pill .scene-pill-name { font-size: 11px; font-weight: 500; white-space: nowrap; }

    /* ===== ROOM CARDS ===== */
    .rooms-section { padding: 0 0 16px; }
    .section-title { font-size: 16px; font-weight: 700; padding: 0 16px 12px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--rule), transparent); }
    .room-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 16px; }
    .room-card { background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius); padding: 18px 16px; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .room-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--accent-soft), transparent); opacity: 0; transition: opacity 0.3s; }
    .room-card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 8px 28px rgba(157,123,255,0.15); }
    .room-card:hover::before { opacity: 1; }
    .room-card:active { transform: scale(0.97); }
    .room-card .rc-icon { font-size: 36px; margin-bottom: 8px; display: block; filter: drop-shadow(0 0 8px rgba(157,123,255,0.3)); }
    .room-card .rc-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; position: relative; z-index: 1; }
    .room-card .rc-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; position: relative; z-index: 1; }
    .room-card .rc-meta span { color: var(--accent2); }
    .room-card .rc-badge { position: absolute; top: 12px; right: 12px; font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--accent-soft); color: var(--accent); font-weight: 500; }

    /* ===== DEVICE LIST (Room Detail) ===== */
    .room-detail { display: none; }
    .room-detail.active { display: block; animation: fadeSlideIn 0.35s ease; }
    @keyframes fadeSlideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .room-detail-header { display: flex; align-items: center; gap: 12px; padding: 0 16px 16px; }
    .room-detail-back { width: 36px; height: 36px; border-radius: 50%; background: var(--card); border: 1px solid var(--rule); color: var(--ink); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
    .room-detail-back:hover { border-color: var(--accent); }
    .room-detail-title { font-size: 18px; font-weight: 600; }
    .room-detail-sub { font-size: 12px; color: var(--accent2); margin-top: 2px; }
    .device-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 16px; }
    .device-card { background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius-sm); padding: 16px 14px; cursor: pointer; transition: all 0.3s; position: relative; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .device-card:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(157,123,255,0.12); }
    .device-card:active { transform: scale(0.97); }
    .device-card .dc-icon { font-size: 28px; margin-bottom: 6px; display: block; filter: drop-shadow(0 0 6px rgba(157,123,255,0.3)); }
    .device-card .dc-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .device-card .dc-status { font-size: 11px; color: var(--muted); }
    .device-card .dc-toggle { position: absolute; top: 12px; right: 12px; width: 44px; height: 26px; border-radius: 13px; background: var(--bg3); border: 1px solid var(--rule); cursor: pointer; transition: all 0.3s; }
    .device-card .dc-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
    .device-card .dc-toggle.on { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px rgba(157,123,255,0.4); }
    .device-card .dc-toggle.on::after { left: 20px; background: #fff; }

    /* Device detail panel */
    .device-detail { display: none; margin: 0 16px 16px; background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius); padding: 0; max-height: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
    .device-detail.open { max-height: 600px; padding: 20px; border-color: rgba(157,123,255,0.3); box-shadow: 0 0 24px rgba(157,123,255,0.1); }
    .device-detail .dd-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .device-detail .dd-icon { font-size: 32px; filter: drop-shadow(0 0 8px rgba(157,123,255,0.4)); }
    .device-detail .dd-name { font-size: 18px; font-weight: 600; }
    .device-detail .dd-sub { font-size: 12px; color: var(--muted); }
    .demo-area { background: var(--bg3); border-radius: 10px; padding: 16px; margin-bottom: 14px; display: flex; align-items: center; justify-content: center; min-height: 80px; position: relative; border: 1px solid rgba(0,229,192,0.1); }
    .demo-area svg { max-width: 100%; }
    .demo-label { font-size: 10px; color: var(--accent2); text-transform: uppercase; letter-spacing: 2px; position: absolute; top: 8px; left: 12px; font-weight: 600; text-shadow: 0 0 6px rgba(0,229,192,0.4); }
    .dd-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; }
    .dd-item { background: var(--bg3); border-radius: 8px; padding: 12px; border: 1px solid rgba(157,123,255,0.06); }
    .dd-item-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; color: var(--accent2); text-shadow: 0 0 6px rgba(0,229,192,0.3); }
    .dd-item-desc { font-size: 11px; color: var(--muted); }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(6,6,10,0.92); backdrop-filter: blur(24px); border-top: 1px solid var(--rule); padding: 8px 0 calc(8px + var(--safe-bottom)); display: flex; justify-content: space-around; }
    .bottom-nav::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent); opacity: 0.3; }
    .bn-item { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; color: var(--muted); font-family: inherit; font-size: 10px; cursor: pointer; padding: 4px 12px; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
    .bn-item .bn-icon { font-size: 20px; line-height: 1; }
    .bn-item.active { color: var(--accent); }
    .bn-item.active .bn-icon { filter: drop-shadow(0 0 6px rgba(157,123,255,0.5)); }

    /* Scene toast */
    .scene-toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.8); z-index: 200; background: rgba(14,14,24,0.95); border: 1px solid rgba(157,123,255,0.3); border-radius: 16px; padding: 24px 32px; text-align: center; pointer-events: none; opacity: 0; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); backdrop-filter: blur(16px); box-shadow: 0 0 40px rgba(157,123,255,0.2); }
    .scene-toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    .scene-toast .st-icon { font-size: 40px; display: block; margin-bottom: 8px; }
    .scene-toast .st-name { font-size: 16px; font-weight: 600; }
    .scene-toast .st-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    @media (max-width: 500px) {
      .room-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .device-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .dd-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="sci-particles" aria-hidden="true">
    <div class="sci-particle" style="left:5%;animation-delay:0s"></div>
    <div class="sci-particle" style="left:12%;animation-delay:1.5s"></div>
    <div class="sci-particle" style="left:22%;animation-delay:3s"></div>
    <div class="sci-particle" style="left:35%;animation-delay:0.8s"></div>
    <div class="sci-particle" style="left:48%;animation-delay:4s"></div>
    <div class="sci-particle" style="left:55%;animation-delay:2.2s"></div>
    <div class="sci-particle" style="left:68%;animation-delay:1s"></div>
    <div class="sci-particle" style="left:75%;animation-delay:3.5s"></div>
    <div class="sci-particle" style="left:85%;animation-delay:0.5s"></div>
    <div class="sci-particle" style="left:92%;animation-delay:2.8s"></div>
  </div>

  <div class="page">
    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="header-home">
          <span class="header-home-name">智慧之家</span>
          <span class="header-home-arrow">▼</span>
        </div>
        <div class="header-actions">
          <div class="nav-versions">
            <a class="nav-ver" href="smart-home-devices/smart-home-devices.html">V1</a>
            <a class="nav-ver" href="smart-home-demo/smart-home-demo.html">V2</a>
            <a class="nav-ver active" href="./">V3</a>
          </div>
        </div>
      </div>
      <div class="header-weather">
        <span class="temp">26°</span> 晴 · 上海 · 室外 32°
      </div>
      <div class="header-status">
        <span class="dot"></span> 全屋在线 · 24 台设备运行中
      </div>
    </header>

    <!-- Scene Quick Bar -->
    <div class="scene-bar">
      <div class="scene-bar-scroll" id="sceneBar">
        <button class="scene-pill" data-scene="home" onclick="triggerScene('home', this)">
          <span class="scene-pill-icon">🏠</span>
          <span class="scene-pill-name">回家</span>
        </button>
        <button class="scene-pill" data-scene="sleep" onclick="triggerScene('sleep', this)">
          <span class="scene-pill-icon">🌙</span>
          <span class="scene-pill-name">睡眠</span>
        </button>
        <button class="scene-pill" data-scene="movie" onclick="triggerScene('movie', this)">
          <span class="scene-pill-icon">🎬</span>
          <span class="scene-pill-name">观影</span>
        </button>
        <button class="scene-pill" data-scene="away" onclick="triggerScene('away', this)">
          <span class="scene-pill-icon">🚪</span>
          <span class="scene-pill-name">离家</span>
        </button>
        <button class="scene-pill" onclick="alert('更多场景开发中...')">
          <span class="scene-pill-icon">➕</span>
          <span class="scene-pill-name">自定义</span>
        </button>
      </div>
    </div>

    <!-- Room Cards -->
    <div class="rooms-section" id="roomsSection">
      <div class="section-title">房间</div>
      <div class="room-grid" id="roomGrid"></div>
    </div>

    <!-- Room Detail (hidden by default) -->
    <div class="room-detail" id="roomDetail">
      <div class="room-detail-header">
        <button class="room-detail-back" onclick="backToRooms()">←</button>
        <div>
          <div class="room-detail-title" id="rdTitle"></div>
          <div class="room-detail-sub" id="rdSub"></div>
        </div>
      </div>
      <div class="device-grid" id="deviceGrid"></div>
      <div class="device-detail" id="deviceDetail">
        <div class="dd-header">
          <span class="dd-icon" id="ddIcon"></span>
          <div>
            <div class="dd-name" id="ddName"></div>
            <div class="dd-sub" id="ddSub"></div>
          </div>
        </div>
        <div class="demo-area" id="demoArea"></div>
        <div class="dd-grid" id="ddGrid"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="bn-item active" data-tab="home" onclick="switchTab('home', this)">
      <span class="bn-icon">🏠</span> 首页
    </button>
    <button class="bn-item" data-tab="scenes" onclick="switchTab('scenes', this)">
      <span class="bn-icon">⚡</span> 场景
    </button>
    <button class="bn-item" data-tab="devices" onclick="switchTab('devices', this)">
      <span class="bn-icon">📱</span> 设备
    </button>
    <button class="bn-item" data-tab="about" onclick="switchTab('about', this)">
      <span class="bn-icon">ℹ️</span> 关于
    </button>
  </nav>

  <!-- Scene Toast -->
  <div class="scene-toast" id="sceneToast">
    <span class="st-icon" id="stIcon"></span>
    <div class="st-name" id="stName"></div>
    <div class="st-sub" id="stSub"></div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
